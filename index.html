<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FAZGAME | Hub Dashboard — Pixel Gaming + Original Header</title>
    <meta name="description" content="FAZGAME Hub – Invoice, Build Tracker, Profit & Loss, PC Builder, Inventory Management with retro pixel theme & original header">
    <!-- Original header fonts (Inter + Clash Display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700,600&display=swap" rel="stylesheet">
    <!-- Pixel fonts for gaming elements -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #111216;
            --text: #fff;
            --muted: #a0a0b0;
            --accent: #ffd84d;
            --accent-dark: #e6c43d;
            --accent-glow: 0 0 20px rgba(255, 216, 77, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            --header-bg: rgba(11, 11, 15, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.06);
            /* pixel theme overrides for cards & background */
            --pixel-bg: #0c0b1a;
            --pixel-border: #ffd84d;
            --pixel-card-bg: #1e1b2cee;
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg-secondary: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #eab308;
            --accent-dark: #ca8a04;
            --border-color: rgba(0, 0, 0, 0.1);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --glass-border: 1px solid rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.3s ease;
            position: relative;
        }
        a { text-decoration: none; color: inherit; }

        /* Pixel animated background (retro grid + falling pixels) */
        #pixel-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* original subtle grid overlay (kept for ambiance) */
        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        /* ========== ORIGINAL HEADER STYLES (glassmorphism) ========== */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--header-bg); backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border); padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); flex-shrink: 0;
        }
        @media (min-width: 768px) { header { padding: 16px 24px; } }
        .header-inner {
            max-width: 1400px; margin: 0 auto; display: flex;
            align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left .logo-img { height: 40px; width: auto; opacity: 0.95; transition: opacity 0.3s ease; }
        .header-left .logo-text {
            font-family: 'Clash Display', sans-serif;
            font-weight: 700; font-size: 24px; letter-spacing: -0.5px;
        }
        .header-left .logo-text span:last-child { color: var(--accent); }
        .header-logos { display: flex; gap: 12px; align-items: center; }
        @media (min-width: 768px) { .header-logos { gap: 20px; } }
        .header-logos img { width: 20px; transition: 0.3s ease; }
        body:not(.light-mode) .header-logos img { filter: invert(1); opacity: 0.7; }
        body.light-mode .header-logos img { filter: none; opacity: 0.8; }
        .header-logos img:hover { opacity: 1; transform: translateY(-2px); }
        @media (max-width: 680px) {
            .header-inner { flex-direction: column; align-items: center; }
            .header-logos { justify-content: center; }
        }

        /* ========== MAIN CONTENT (Pixel Gaming Cards & Title) ========== */
        .main-content {
            flex: 1;
            position: relative;
            z-index: 2;
            padding: 28px 16px;
        }
        @media (min-width: 768px) { .main-content { padding: 48px 24px; } }
        .hub-container {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        /* PIXEL TITLE - following pixel design (Press Start 2P) */
        .hub-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .hub-title {
            font-family: 'Press Start 2P', monospace;
            font-weight: 400; /* Press Start 2P has only regular weight */
            font-size: 1.8rem;
            letter-spacing: 1px;
            line-height: 1.3;
            margin: 0 0 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            text-shadow: 3px 3px 0 #ff00aa, 5px 5px 0 #00ffcc;
        }
        @media (min-width: 768px) { 
            .hub-title { font-size: 2.2rem; gap: 12px; }
        }
        @media (max-width: 640px) { 
            .hub-title { font-size: 1.2rem; gap: 6px; text-shadow: 2px 2px 0 #ff00aa, 3px 3px 0 #00ffcc; }
        }
        .faz-white { color: var(--text); }
        .game-hub-yellow { color: var(--accent); }

        /* Pixel system label (gaming touch) */
        .hub-system-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #00ffcc;
            background: #00000066;
            display: inline-block;
            padding: 6px 12px;
            border: 2px solid var(--accent);
            box-shadow: inset 0px 0px 0px 1px #ffffff22, 3px 3px 0px black;
        }

        /* Pixel card grid - responsive, 2 cols on mobile */
        .card-grid {
            display: grid;
            gap: 24px;
            padding: 4px;
        }
        @media (min-width: 1025px) { .card-grid { grid-template-columns: repeat(3, 1fr); gap: 28px; } }
        @media (min-width: 769px) and (max-width: 1024px) { .card-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media (min-width: 641px) and (max-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); gap: 22px; } }
        @media (max-width: 640px) { .card-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
        @media (max-width: 480px) { .card-grid { gap: 14px; } }

        /* Pixel Card style (retro arcade) */
        .hub-card {
            background: var(--pixel-card-bg);
            border: 3px solid var(--pixel-border);
            box-shadow: 6px 6px 0px 0px #000000aa;
            border-radius: 0px;
            aspect-ratio: 4 / 3;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
            transition: all 0.05s linear;
            text-align: center;
            position: relative;
            backdrop-filter: none;
            image-rendering: pixelated;
        }
        .hub-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px #000000cc;
            background: #2a2640;
            border-color: #ffcc33;
        }
        .hub-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px black;
        }

        .card-icon-wrapper {
            width: 64px;
            height: 64px;
            background: #00000077;
            border: 2px solid var(--accent);
            box-shadow: inset 0 0 0 2px #ffffff22, 3px 3px 0 black;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            transition: 0.05s linear;
        }
        .hub-card:hover .card-icon-wrapper {
            background: #000000aa;
            border-color: #fff;
        }
        .card-icon-wrapper svg {
            width: 36px;
            height: 36px;
            stroke: var(--accent);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(1px 1px 0 black);
        }
        @media (max-width: 640px) {
            .card-icon-wrapper { width: 52px; height: 52px; margin-bottom: 10px; }
            .card-icon-wrapper svg { width: 28px; height: 28px; }
        }
        .card-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
            color: white;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 0.5px;
        }
        @media (min-width: 768px) { .card-title { font-size: 0.85rem; } }
        @media (max-width: 640px) { .card-title { font-size: 0.65rem; } }
        .card-arrow {
            margin-top: 8px;
            font-size: 1rem;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.1s ease;
            color: #00ffcc;
            font-family: monospace;
        }
        .hub-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(2px);
        }

        /* footer original style (glassmorphism) */
        footer {
            text-align: center;
            padding: 24px 20px;
            color: var(--muted);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            background: var(--header-bg);
            backdrop-filter: var(--glass-blur);
        }

        /* back to top button (original style) */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            border: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .back-to-top.visible { opacity: 1; visibility: visible; }
        .back-to-top:hover { background: var(--accent-dark); transform: translateY(-3px); }

        .hub-card:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <!-- Pixel animated canvas background -->
    <canvas id="pixel-canvas"></canvas>

    <div class="back-to-top" id="backToTop">↑</div>

    <!-- ORIGINAL HEADER (glassmorphism) -->
    <header>
        <div class="header-inner">
            <div class="header-left">
                <img src="images/logo1.png" alt="FAZGAME Logo" class="logo-img" onerror="this.src='https://placehold.co/300x300/222/ffd84d?text=FAZGAME';">
                <div class="logo-text"><span>FAZ</span><span>GAME</span></div>
            </div>
            <div class="header-logos">
                <img src="https://api.iconify.design/simple-icons/playstation.svg" alt="PlayStation">
                <img src="https://api.iconify.design/simple-icons/xbox.svg" alt="Xbox">
                <img src="https://api.iconify.design/simple-icons/nintendoswitch.svg" alt="Nintendo Switch">
                <img src="https://api.iconify.design/mdi/desktop-classic.svg" alt="PC">
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="hub-container">
            <div class="hub-header">
                <!-- Pixel font title (Press Start 2P) for FAZ Game Hub -->
                <h1 class="hub-title">
                    <span class="faz-white">FAZ</span>
                    <span class="game-hub-yellow">Game Hub</span>
                </h1>
                <!-- Pixel system label (gaming touch) -->
                <div class="hub-system-label">▶ SYSTEM MANAGEMENT ◀</div>
            </div>

            <div class="card-grid">
                <a href="invoice.html" class="hub-card" title="Invoice & Quotation">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    </div>
                    <span class="card-title">INVOICE /<br>QUOTATION</span>
                    <span class="card-arrow">►</span>
                </a>

                <a href="#" class="hub-card" title="Build Progress Tracker">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
                    </div>
                    <span class="card-title">BUILD PROGRESS<br>TRACKER</span>
                    <span class="card-arrow">►</span>
                </a>

                <a href="#" class="hub-card" title="Profit and Loss">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    </div>
                    <span class="card-title">PROFIT &<br>LOSS</span>
                    <span class="card-arrow">►</span>
                </a>

                <a href="#" class="hub-card" title="Custom PC Builder + Compatibility">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><polyline points="9 11 11 13 15 9"/></svg>
                    </div>
                    <span class="card-title">CUSTOM PC BUILDER<br>+ COMPATIBILITY</span>
                    <span class="card-arrow">►</span>
                </a>

                <a href="#" class="hub-card" title="Inventory Management">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    </div>
                    <span class="card-title">INVENTORY<br>MANAGEMENT</span>
                    <span class="card-arrow">►</span>
                </a>
            </div>
        </div>
    </main>

    <footer>&copy; 2026 FAZGAME &bull; Faz Service, Faz Gaming</footer>

    <script>
        // Pixel background animation (falling blocks + retro grid)
        (function pixelBackground() {
            const canvas = document.getElementById('pixel-canvas');
            if (!canvas) return;
            let ctx = canvas.getContext('2d');
            let width, height;
            let pixels = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initPixels();
            }

            class PixelBlock {
                constructor(x, y, size, speed, color) {
                    this.x = x;
                    this.y = y;
                    this.size = size;
                    this.speed = speed;
                    this.color = color;
                }
                update() {
                    this.y += this.speed;
                    if (this.y > height + this.size) {
                        this.y = -this.size;
                        this.x = Math.random() * width;
                        this.speed = 0.8 + Math.random() * 2.5;
                    }
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                    ctx.strokeStyle = '#00000044';
                    ctx.strokeRect(this.x, this.y, this.size, this.size);
                }
            }

            function initPixels() {
                const pixelCount = Math.min(120, Math.floor((width * height) / 5000));
                pixels = [];
                const palette = ['#ffd84d', '#ffaa44', '#ff5e7e', '#9b4dff', '#2ecc71', '#00ffcc', '#ff66cc'];
                for (let i = 0; i < pixelCount; i++) {
                    let size = 6 + Math.floor(Math.random() * 10);
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    let speed = 0.6 + Math.random() * 2.8;
                    let color = palette[Math.floor(Math.random() * palette.length)];
                    pixels.push(new PixelBlock(x, y, size, speed, color));
                }
                for (let i = 0; i < 60; i++) {
                    let size = 3;
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    let speed = 0.3 + Math.random() * 1.5;
                    let color = '#ffd84d';
                    pixels.push(new PixelBlock(x, y, size, speed, color));
                }
            }

            function drawBackgroundGrid() {
                ctx.fillStyle = '#0c0b1a';
                ctx.fillRect(0, 0, width, height);
                ctx.strokeStyle = '#2a2740';
                ctx.lineWidth = 1;
                const step = 28;
                for (let x = 0; x < width; x += step) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                for (let y = 0; y < height; y += step) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
                ctx.fillStyle = '#ffffff08';
                for (let i = 0; i < height; i += 4) {
                    ctx.fillRect(0, i, width, 1);
                }
            }

            function animate() {
                if (!ctx) return;
                drawBackgroundGrid();
                for (let p of pixels) {
                    p.update();
                    p.draw();
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => resize());
            resize();
            animate();
        })();

        // Back to top logic
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 200);
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Logo fallback
        const logo = document.querySelector('.logo-img');
        if (logo && logo.complete && logo.naturalWidth === 0) {
            logo.onerror = null;
            logo.src = 'https://placehold.co/300x300/222/ffd84d?text=FAZGAME';
        }

        // Prevent default on placeholder links
        document.querySelectorAll('.hub-card[href="#"]').forEach(card => {
            card.addEventListener('click', (e) => e.preventDefault());
        });
    </script>
</body>
</html>
