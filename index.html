<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FAZGAME | Hub Dashboard</title>
    <meta name="description" content="FAZGAME Hub – Invoice, Build Tracker, Profit & Loss, PC Builder, Inventory Management">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #111216;
            --card-bg: rgba(20, 22, 27, 0.4);
            --text: #fff;
            --muted: #a0a0b0;
            --accent: #ffd84d;
            --accent-dark: #e6c43d;
            --accent-glow: 0 0 20px rgba(255, 216, 77, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(30, 32, 40, 0.6);
            --transition: 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            --header-bg: rgba(11, 11, 15, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.06);
            --glass-bg: rgba(20, 22, 27, 0.3);
            --hub-glow-1: rgba(255, 216, 77, 0.3);
            --hub-glow-2: rgba(255, 179, 71, 0.3);
            --hub-glow-3: rgba(255, 140, 66, 0.3);
            --hub-glow-4: rgba(255, 107, 107, 0.3);
            --hub-glow-5: rgba(192, 132, 252, 0.3);
        }
        body.light-mode {
            --bg: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --muted: #475569;
            --accent: #eab308;
            --accent-dark: #ca8a04;
            --accent-glow: 0 0 20px rgba(234, 179, 8, 0.2);
            --border-color: rgba(0, 0, 0, 0.1);
            --card-hover: rgba(255, 255, 255, 1);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --glass-border: 1px solid rgba(0, 0, 0, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --hub-glow-1: rgba(234, 179, 8, 0.12);
            --hub-glow-2: rgba(234, 179, 8, 0.1);
            --hub-glow-3: rgba(234, 179, 8, 0.08);
            --hub-glow-4: rgba(234, 179, 8, 0.1);
            --hub-glow-5: rgba(234, 179, 8, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.3s ease;
        }
        a { text-decoration: none; color: inherit; }

        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }
        body.light-mode::before {
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        }

        .hub-card { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23ffd84d" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>') 12 0, pointer; }
        @media (pointer: coarse) { .hub-card { cursor: pointer; } }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--header-bg); backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border); padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); flex-shrink: 0;
        }
        @media (min-width: 768px) { header { padding: 16px 24px; } }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left .logo-img { height: 40px; width: auto; opacity: 0.95; transition: opacity 0.3s ease; }
        .header-left .logo-text { font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: -0.5px; }
        .header-left .logo-text span:last-child { color: var(--accent); }
        .header-logos { display: flex; gap: 12px; align-items: center; }
        @media (min-width: 768px) { .header-logos { gap: 20px; } }
        .header-logos img { width: 20px; transition: var(--transition); }
        body:not(.light-mode) .header-logos img { filter: invert(1); opacity: 0.7; }
        body.light-mode .header-logos img { filter: none; opacity: 0.8; }
        .header-logos img:hover { opacity: 1; transform: translateY(-2px); }
        @media (max-width: 680px) { .header-inner { flex-direction: column; align-items: center; } .header-logos { justify-content: center; } }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; padding: 24px 16px; }
        @media (min-width: 768px) { .main-content { padding: 40px 24px; } }
        .hub-container { width: 100%; max-width: 1280px; margin: 0 auto; }

        .hub-header { text-align: center; margin-bottom: 40px; }
        @media (min-width: 768px) { .hub-header { margin-bottom: 56px; } }
        .hub-title {
            font-family: 'Clash Display', sans-serif;
            font-weight: 700;
            font-size: 2.4rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin: 0 0 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.25rem;
        }
        @media (min-width: 768px) { .hub-title { font-size: 2.8rem; } }
        @media (max-width: 640px) { .hub-title { font-size: 1.8rem; gap: 0.15rem; } }
        .faz-white {
            color: var(--text);
        }
        .game-hub-yellow {
            color: var(--accent);
        }
        .hub-system-label { font-family: 'Clash Display', sans-serif; font-weight: 600; font-size: 0.95rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin: 0; }
        @media (min-width: 768px) { .hub-system-label { font-size: 1.05rem; letter-spacing: 0.15em; } }

        /* ===== RESPONSIVE GRID SYSTEM - auto fixes any size, mobile 2 cards ===== */
        .card-grid {
            display: grid;
            gap: 20px;
            padding: 0 4px;
        }
        
        /* Default: flexible but ensures cards look balanced on large */
        @media (min-width: 1025px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }
        }
        
        /* Tablet landscape / small laptops: 2 to 3 cards but keep stable 3 cols on medium */
        @media (min-width: 769px) and (max-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }
        
        /* Large tablet / small devices: show 2 columns for better touch targets */
        @media (min-width: 641px) and (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
        }
        
        /* MOBILE FIRST: exactly 2 cards per row on all phones & narrow devices */
        @media (max-width: 640px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
        }
        
        /* For extremely tiny devices (<= 400px) still 2 columns, but reduce internal spacing */
        @media (max-width: 480px) {
            .card-grid {
                gap: 12px;
            }
        }

        /* Universal card styling with responsive aspect & padding */
        .hub-card {
            position: relative; 
            background: var(--glass-bg); 
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border); 
            border-radius: 24px;
            aspect-ratio: 4 / 3;
            cursor: pointer; 
            text-decoration: none; 
            color: inherit;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 20px 12px;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            overflow: hidden; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            box-shadow: var(--card-shadow);
            text-align: center;
        }
        
        /* responsive padding adjustments */
        @media (min-width: 768px) {
            .hub-card {
                padding: 28px 20px;
            }
        }
        @media (max-width: 640px) {
            .hub-card {
                padding: 16px 10px;
                border-radius: 20px;
            }
        }
        @media (max-width: 480px) {
            .hub-card {
                padding: 14px 8px;
            }
        }
        
        .hub-card::before {
            content: ''; 
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            opacity: 0; 
            transition: opacity 0.35s ease; 
            z-index: 0; 
            pointer-events: none;
        }
        .hub-card:nth-child(1)::before { background: radial-gradient(circle at 50% 30%, var(--hub-glow-1) 0%, transparent 70%); }
        .hub-card:nth-child(2)::before { background: radial-gradient(circle at 50% 30%, var(--hub-glow-2) 0%, transparent 70%); }
        .hub-card:nth-child(3)::before { background: radial-gradient(circle at 50% 30%, var(--hub-glow-3) 0%, transparent 70%); }
        .hub-card:nth-child(4)::before { background: radial-gradient(circle at 50% 30%, var(--hub-glow-4) 0%, transparent 70%); }
        .hub-card:nth-child(5)::before { background: radial-gradient(circle at 50% 30%, var(--hub-glow-5) 0%, transparent 70%); }
        .hub-card:hover::before { opacity: 1; }
        .hub-card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        body.light-mode .hub-card:hover { border-color: rgba(0,0,0,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .hub-card:nth-child(1):hover { border-color: rgba(255,216,77,0.7); }
        .hub-card:nth-child(2):hover { border-color: rgba(255,179,71,0.7); }
        .hub-card:nth-child(3):hover { border-color: rgba(255,140,66,0.7); }
        .hub-card:nth-child(4):hover { border-color: rgba(255,107,107,0.7); }
        .hub-card:nth-child(5):hover { border-color: rgba(192,132,252,0.7); }
        .hub-card:active { transform: scale(0.97); transition: transform 0.1s ease; }
        .hub-card>* { position: relative; z-index: 1; }

        /* Icon wrapper: scales gracefully on small devices */
        .card-icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            transition: transform 0.35s ease, box-shadow 0.35s ease, color 0.3s ease;
            flex-shrink: 0;
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }
        body.light-mode .card-icon-wrapper { background: rgba(0,0,0,0.05); }
        .card-icon-wrapper svg { width: 30px; height: 30px; stroke: currentColor; stroke-width: 1.8; fill: none; }
        .hub-card:hover .card-icon-wrapper { transform: scale(1.05); }
        
        /* responsive icon size for mobile */
        @media (max-width: 640px) {
            .card-icon-wrapper { width: 52px; height: 52px; margin-bottom: 12px; border-radius: 16px; }
            .card-icon-wrapper svg { width: 26px; height: 26px; }
        }
        @media (max-width: 480px) {
            .card-icon-wrapper { width: 46px; height: 46px; margin-bottom: 10px; }
            .card-icon-wrapper svg { width: 24px; height: 24px; }
        }
        
        /* themed hover icon colors */
        .hub-card:nth-child(1):hover .card-icon-wrapper { box-shadow: 0 0 20px var(--hub-glow-1); color: #ffe08a; }
        .hub-card:nth-child(2):hover .card-icon-wrapper { box-shadow: 0 0 20px var(--hub-glow-2); color: #ffc078; }
        .hub-card:nth-child(3):hover .card-icon-wrapper { box-shadow: 0 0 20px var(--hub-glow-3); color: #ffa366; }
        .hub-card:nth-child(4):hover .card-icon-wrapper { box-shadow: 0 0 20px var(--hub-glow-4); color: #ff8a8a; }
        .hub-card:nth-child(5):hover .card-icon-wrapper { box-shadow: 0 0 20px var(--hub-glow-5); color: #d4b5ff; }
        
        .card-title {
            font-family: 'Clash Display', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            letter-spacing: -0.01em;
            color: var(--text);
            line-height: 1.3;
            transition: color 0.3s ease;
            max-width: 100%;
            word-break: break-word;
        }
        @media (min-width: 768px) {
            .card-title { font-size: 1.1rem; }
        }
        @media (max-width: 640px) {
            .card-title { font-size: 0.85rem; }
        }
        @media (max-width: 480px) {
            .card-title { font-size: 0.78rem; letter-spacing: -0.2px; }
        }
        
        .hub-card:nth-child(1):hover .card-title { color: #ffe08a; }
        .hub-card:nth-child(2):hover .card-title { color: #ffc078; }
        .hub-card:nth-child(3):hover .card-title { color: #ffa366; }
        .hub-card:nth-child(4):hover .card-title { color: #ff8a8a; }
        .hub-card:nth-child(5):hover .card-title { color: #d4b5ff; }
        
        .card-arrow {
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0;
            transform: translateX(-6px);
            transition: all 0.3s ease;
            color: var(--accent);
        }
        .hub-card:hover .card-arrow { opacity: 1; transform: translateX(0); }
        @media (max-width: 640px) {
            .card-arrow { margin-top: 6px; font-size: 0.9rem; }
        }
        
        .hub-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 20px; }

        footer { 
            text-align: center; 
            padding: 24px 20px; 
            color: var(--muted); 
            font-size: 13px; 
            border-top: 1px solid var(--border-color); 
            flex-shrink: 0; 
            position: relative; 
            z-index: 10; 
            background: var(--header-bg); 
            backdrop-filter: var(--glass-blur); 
        }

        .back-to-top { 
            position: fixed; 
            bottom: 24px; 
            right: 24px; 
            width: 48px; 
            height: 48px; 
            border-radius: 40px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            font-size: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            opacity: 0; 
            visibility: hidden; 
            transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.2s; 
            z-index: 999; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            font-weight: bold;
        }
        .back-to-top.visible { opacity: 1; visibility: visible; }
        .back-to-top:hover { background: var(--accent-dark); transform: translateY(-3px); }
        
        /* smooth overflow handling for any size */
        img, svg { max-width: 100%; }
        
        /* ensure small devices readability */
        @media (max-width: 400px) {
            .hub-card .card-title br { display: none; }
            .card-title { white-space: normal; }
        }
    </style>
</head>
<body>

    <div class="back-to-top" id="backToTop" aria-label="Back to top">↑</div>

    <header>
        <div class="header-inner">
            <div class="header-left">
                <img src="images/logo1.png" alt="FAZGAME Logo" class="logo-img" onerror="this.src='https://placehold.co/300x300/222/ffd84d?text=FAZGAME';">
                <div class="logo-text"><span>FAZ</span><span>GAME</span></div>
            </div>
            <div class="header-logos">
                <img src="https://api.iconify.design/simple-icons/playstation.svg" alt="PlayStation">
                <img src="https://api.iconify.design/simple-icons/xbox.svg" alt="Xbox">
                <img src="https://api.iconify.design/simple-icons/nintendoswitch.svg" alt="Nintendo Switch">
                <img src="https://api.iconify.design/mdi/desktop-classic.svg" alt="PC">
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="hub-container">
            <div class="hub-header">
                <!-- Title updated: "FAZ" white, "Game Hub" yellow -->
                <h1 class="hub-title">
                    <span class="faz-white">FAZ</span>
                    <span class="game-hub-yellow">Game Hub</span>
                </h1>
                <p class="hub-system-label">SYSTEM MANAGEMENT</p>
            </div>

            <div class="card-grid">
                <!-- Card 1: Invoice / Quotation - linked to invoice.html -->
                <a href="invoice.html" class="hub-card" title="Invoice & Quotation" aria-label="Invoice and Quotation">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    </div>
                    <span class="card-title">Invoice /<br>Quotation</span>
                    <span class="card-arrow">→</span>
                </a>

                <!-- Card 2: Build Progress Tracker -->
                <a href="#" class="hub-card" title="Build Progress Tracker" aria-label="Build Progress Tracker">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
                    </div>
                    <span class="card-title">Build Progress<br>Tracker</span>
                    <span class="card-arrow">→</span>
                </a>
                
                <!-- Card 3: Profit and Loss -->
                <a href="#" class="hub-card" title="Profit and Loss" aria-label="Profit and Loss">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    </div>
                    <span class="card-title">Profit &<br>Loss</span>
                    <span class="card-arrow">→</span>
                </a>
                
                <!-- Card 4: Custom PC Builder + Compatibility Checker -->
                <a href="#" class="hub-card" title="Custom PC Builder + Compatibility Checker" aria-label="Custom PC Builder and Compatibility Checker">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><polyline points="9 11 11 13 15 9"/></svg>
                    </div>
                    <span class="card-title">Custom PC Builder<br>+ Compatibility</span>
                    <span class="card-arrow">→</span>
                </a>
                
                <!-- Card 5: Inventory Management -->
                <a href="#" class="hub-card" title="Inventory Management" aria-label="Inventory Management">
                    <div class="card-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    </div>
                    <span class="card-title">Inventory<br>Management</span>
                    <span class="card-arrow">→</span>
                </a>
            </div>
        </div>
    </main>

    <footer>&copy; 2026 FAZGAME &bull; Faz Service, Faz Gaming</footer>

    <script>
        // Back to top button logic
        const backToTop = document.getElementById('backToTop');
        if (backToTop) {
            window.addEventListener('scroll', () => {
                const isVisible = window.scrollY > 200;
                backToTop.classList.toggle('visible', isVisible);
            });
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
        
        // Optional: handle logo fallback
        const logo = document.querySelector('.logo-img');
        if (logo && logo.complete && logo.naturalWidth === 0) {
            logo.onerror = null;
            logo.src = 'https://placehold.co/300x300/222/ffd84d?text=FAZGAME';
        }
        
        // subtle placeholder interaction for cards with '#' links
        const allCards = document.querySelectorAll('.hub-card');
        allCards.forEach(card => {
            card.addEventListener('click', (e) => {
                if (card.getAttribute('href') === '#') {
                    e.preventDefault();
                    // optional: small haptic feedback on supported devices (silent)
                }
            });
        });
    </script>
</body>
</html>
